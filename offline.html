<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#004b9b">
  <link rel="icon" href="arma-avatar-192.png">
  <title>A.R.M.A. | SIN CONEXIÓN</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;
      font-family:Segoe UI,Arial,sans-serif;background:#eef3f9;color:#002b66}
    .card{width:min(620px,96vw);background:#fff;border:1px solid #dbe5f0;
      border-radius:24px;box-shadow:0 24px 60px rgba(0,43,102,.18);overflow:hidden}
    .head{padding:24px;background:linear-gradient(135deg,#002b66,#004b9b,#0076d7);
      color:#fff;text-align:center}
    .head img{width:112px;height:112px;border-radius:28px;object-fit:cover;
      border:3px solid rgba(255,255,255,.85);box-shadow:0 12px 28px rgba(0,0,0,.22)}
    .head h1{margin:14px 0 4px;font-size:30px}
    .body{padding:28px;text-align:center}
    .body p{font-size:18px;line-height:1.5;font-weight:700;margin:0 0 20px}
    button{border:0;border-radius:14px;padding:14px 24px;
      background:linear-gradient(180deg,#00d65f,#55b52e);color:#fff;
      font-size:17px;font-weight:900;cursor:pointer;min-height:52px}
  </style>
</head>
<body>
  <main class="card">
    <section class="head">
      <img src="arma-avatar-192.png" alt="A.R.M.A.">
      <h1>A.R.M.A.</h1>
      <div>ASSET RELIABILITY &amp; MAINTENANCE ANALYTICS</div>
    </section>
    <section class="body">
      <p>NO HAY CONEXIÓN DISPONIBLE. LOS DATOS OPERATIVOS DE A.R.M.A. REQUIEREN ACCESO A INTERNET.</p>
      <button type="button" onclick="location.reload()">REINTENTAR CONEXIÓN</button>
    </section>
  </main>
</body>
</html>
